<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <title>Frontend Mentor | Blog preview card</title>
  <link rel="stylesheet" href="./styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <main> 
    <article class="card">
      <header>
        <img class="card-img" src="./assets/images/illustration-article.svg" alt="illustration of code snippet and design elements">
        <span class="learning">Learning</span>
        <p class="date-time">Published <time datetime="2023-12-21">21 Dec 2023</time></p>
        <h1 class="card-title">HTML & CSS foundations</h1>
      </header>  
      <p class="quote">These languages are the backbone of every website, defining structure, content, and presentation.</p>
      <footer>
        <div class="author">
          <img class="avatar" src="./assets/images/image-avatar.webp" alt="picture of a man with white skin and black hair wearing a white T-shirt">
          <p class="name">Greg Hooper</p>
        </div>
      </footer>
    </article>
  </main>
  <footer class="attribution">
    Challenge by <a rel="noopener noreferrer" target="_blank" href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a rel="noopener noreferrer" target="_blank" href="https://github.com/arshiya-sr">arshiya_sr</a>.
  </footer>
</body>
</html>
